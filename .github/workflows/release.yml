name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - rid: win-x64
            name: windows-x64
          - rid: win-arm64
            name: windows-arm64
          - rid: linux-x64
            name: linux-x64
          - rid: linux-arm64
            name: linux-arm64
          - rid: osx-x64
            name: macos-x64
          - rid: osx-arm64
            name: macos-arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish loader
        run: dotnet publish src/MurderModLoader -c Release -o dist/loader/

      - name: Publish installer
        run: dotnet publish src/MurderModLoader.Installer -c Release -r ${{ matrix.rid }} --self-contained -p:PublishSingleFile=true -o dist/installer/

      - name: Copy docs
        run: |
          cp README.md dist/
          cp LICENSE dist/

      - name: Package
        run: cd dist && zip -r ../murder-mod-loader-${{ github.event.release.tag_name }}-${{ matrix.name }}.zip .

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.event.release.tag_name }} murder-mod-loader-${{ github.event.release.tag_name }}-${{ matrix.name }}.zip --clobber
