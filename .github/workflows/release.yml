name: Release

on:
  push:
    tags:
      - 'v*'

permissions: {}

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Get tag name
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ steps.tag.outputs.tag }}" --repo "${{ github.repository }}" --draft --generate-notes --title "murder-mod-loader ${{ steps.tag.outputs.tag }}"

  loader:
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish loader
        run: dotnet publish src/MurderModLoader -c Release -o dist/

      - name: Copy docs
        run: |
          cp README.md dist/
          cp LICENSE dist/

      - name: Package
        run: cd dist && zip -r ../murder-mod-loader-${{ needs.create-release.outputs.tag }}.zip .

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ needs.create-release.outputs.tag }}" murder-mod-loader-${{ needs.create-release.outputs.tag }}.zip --clobber --repo "${{ github.repository }}"

  installer:
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - rid: win-x64
            name: windows-x64
          - rid: win-arm64
            name: windows-arm64
          - rid: linux-x64
            name: linux-x64
          - rid: linux-arm64
            name: linux-arm64
          - rid: osx-x64
            name: macos-x64
          - rid: osx-arm64
            name: macos-arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish installer
        run: dotnet publish src/MurderModLoader.Installer -c Release -r ${{ matrix.rid }} --self-contained -p:PublishSingleFile=true -o dist/

      - name: Package
        run: cd dist && zip -r ../murder-mod-install-${{ needs.create-release.outputs.tag }}-${{ matrix.name }}.zip .

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ needs.create-release.outputs.tag }}" murder-mod-install-${{ needs.create-release.outputs.tag }}-${{ matrix.name }}.zip --clobber --repo "${{ github.repository }}"

  publish-release:
    needs: [create-release, loader, installer]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ needs.create-release.outputs.tag }}" --draft=false --repo "${{ github.repository }}"

  publish-nuget:
    needs: [create-release]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Pack
        run: dotnet pack src/MurderModLoader.API -c Release -o artifacts/

      - name: NuGet login
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Publish
        run: >
          dotnet nuget push artifacts/*.nupkg
          --source https://api.nuget.org/v3/index.json
          --api-key ${{ steps.login.outputs.NUGET_API_KEY }}
          --skip-duplicate
