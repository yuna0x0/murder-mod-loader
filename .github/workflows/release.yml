name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish loader
        run: dotnet publish src/MurderModLoader -c Release -o dist/loader/

      - name: Publish installer
        run: dotnet publish src/MurderModLoader.Installer -c Release -o dist/installer/

      - name: Copy docs
        run: |
          cp README.md dist/
          cp LICENSE dist/

      - name: Package
        run: cd dist && zip -r ../murder-mod-loader-${{ github.event.release.tag_name }}.zip .

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.event.release.tag_name }} murder-mod-loader-${{ github.event.release.tag_name }}.zip --clobber
